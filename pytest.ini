[pytest]
# ── Test Discovery ─────────────────────────────────────────────────────────────
testpaths    = Day1
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Playwright Options ─────────────────────────────────────────────────────────
addopts =
    --headed
    --slowmo 500
    --screenshot only-on-failure
    --video retain-on-failure
    --output screenshots
    -v

# ── Markers (document custom markers here to avoid warnings) ──────────────────
markers =
    smoke: Quick sanity checks (run first)
    regression: Full regression suite
    day01: Day 1 - Fundamentals
    day02: Day 2 - Locators
